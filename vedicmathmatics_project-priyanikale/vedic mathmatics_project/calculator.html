<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vedic Mathematics Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', sans-serif;
    }

    body{
      background:#f9fafb;
      color:#1f2937;
      line-height:1.6;
    }

    /* NAVBAR */
    header{
      background:#2d2d2d;
      padding:0.75rem 2.5rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.15);
    }

    header h2{
      color:#ffffff;
      font-size:1.8rem;
      font-weight:700;
    }

    nav a{
      color:#ffffff;
      text-decoration:none;
      margin-left:1.5rem;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#d1d5db;
    }

    /* CALCULATOR */
    .calculator-container{
      max-width:600px;
      margin:4rem auto;
      background:#ffffff;
      padding:2.5rem;
      border-radius:14px;
      box-shadow:0 8px 22px rgba(0,0,0,0.08);
      border-top:5px solid #2d2d2d;
      text-align:center;
    }

    h1{
      color:#2d2d2d;
      margin-bottom:1rem;
      font-size:2rem;
    }

    .calculator-container p{
      color:#4b5563;
      margin-bottom:1.5rem;
    }

    input{
      width:100%;
      padding:0.9rem 1rem;
      margin:0.7rem 0;
      border:1px solid #d1d5db;
      border-radius:8px;
      font-size:1rem;
      outline:none;
      transition:0.3s;
    }

    input:focus{
      border-color:#2d2d2d;
      box-shadow:0 0 0 3px rgba(45,45,45,0.1);
    }

    button{
      background:#2d2d2d;
      color:white;
      border:none;
      padding:0.9rem 1.8rem;
      border-radius:8px;
      cursor:pointer;
      margin-top:1rem;
      font-weight:600;
      transition:0.3s;
    }

    button:hover{
      background:#444;
    }

    #result{
      margin-top:1.5rem;
      font-size:1.2rem;
      font-weight:700;
      color:#111827;
    }

    /* FOOTER */
    footer{
      background:#2d2d2d;
      color:white;
      text-align:center;
      padding:1.2rem;
      margin-top:4rem;
    }

    /* RESPONSIVE */
    @media(max-width:768px){
      header{
        flex-direction:column;
        padding:1rem 1.5rem;
      }

      nav{
        margin-top:0.8rem;
      }

      nav a{
        margin:0.5rem;
      }

      .calculator-container{
        margin:2rem 1rem;
        padding:1.5rem;
      }

      h1{
        font-size:1.7rem;
      }
    }

  </style>
</head>
<body>

  <header>
    <h2>Vedic Mathematics</h2>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="techniques.html">Techniques</a>
      <a href="quiz.html">Quiz</a>
      <a href="calculator.html">Calculator</a>
      <a href="ancient_games.html">Games</a>
    </nav>
  </header>

  <div class="calculator-container">
    <h1>Vedic Multiplication Calculator</h1>
    <p>Multiply two numbers using Vedic Mathematics concept</p>

    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">

    <button onclick="multiplyNumbers()">Calculate</button>

    <div id="result"></div>
  </div>

  <script src="js/calculator.js"></script>

</body>
</html>
