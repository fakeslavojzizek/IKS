<nav class="navbar" [class.scrolled]="scrolled()" id="main-nav">
  <div class="nav-container">
    <a class="nav-logo" href="#" (click)="scrollTo($event, '#hero')">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="16" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
          <path d="M18 4 L26 18 L18 32 L10 18 Z" stroke="url(#goldGrad)" stroke-width="1.2" fill="none"/>
          <circle cx="18" cy="18" r="4" fill="url(#goldGrad)" opacity="0.8"/>
          <circle cx="18" cy="18" r="8" stroke="url(#goldGrad)" stroke-width="0.8" fill="none" opacity="0.4"/>
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fcd97a"/>
              <stop offset="50%" stop-color="#d4a424"/>
              <stop offset="100%" stop-color="#fcd97a"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-title">WINGS OF TIME</span>
        <span class="logo-sub">Viman Shastra Research</span>
      </div>
    </a>

    <div class="nav-links" [class.mobile-open]="mobileMenuOpen()">
      @for (link of navLinks; track link.label) {
        <a class="nav-link" [href]="link.href" (click)="scrollTo($event, link.href)">
          {{ link.label }}
        </a>
      }
      <a class="nav-cta" href="#failsafe" (click)="scrollTo($event, '#failsafe')">
        <span>Explore Protocol</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <button class="mobile-toggle" (click)="toggleMobile()" [attr.aria-expanded]="mobileMenuOpen()" aria-label="Toggle navigation menu">
      <span class="bar" [class.open]="mobileMenuOpen()"></span>
      <span class="bar" [class.open]="mobileMenuOpen()"></span>
      <span class="bar" [class.open]="mobileMenuOpen()"></span>
    </button>
  </div>
</nav>
