<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgLight" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fdfaef"/>
      <stop offset="100%" stop-color="#eadaaf"/>
    </radialGradient>
    <linearGradient id="woodBowl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6e4f32"/>
      <stop offset="100%" stop-color="#2a1c0f"/>
    </linearGradient>
    <linearGradient id="mortarRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a613f"/>
      <stop offset="100%" stop-color="#4a311b"/>
    </linearGradient>
    <filter id="shadow" dx="5" dy="10">
      <feDropShadow dx="3" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgLight)"/>

  <!-- Turmeric Powder Pile -->
  <path d="M 130 420 Q 230 250 350 420 Q 230 500 130 420 Z" fill="#d68c18" filter="url(#shadow)"/>
  <ellipse cx="240" cy="420" rx="95" ry="30" fill="#f7ab0a"/>

  <!-- Star Anise -->
  <g transform="translate(580, 440) scale(1.6)" filter="url(#shadow)">
    <path d="M 0,-30 L 10,-10 L 30,-10 L 15,5 L 25,25 L 0,15 L -25,25 L -15,5 L -30,-10 L -10,-10 Z" fill="#583112"/>
    <circle cx="0" cy="0" r="5" fill="#241205"/>
  </g>
  <g transform="translate(520, 500) scale(1.3) rotate(45)" filter="url(#shadow)">
    <path d="M 0,-30 L 10,-10 L 30,-10 L 15,5 L 25,25 L 0,15 L -25,25 L -15,5 L -30,-10 L -10,-10 Z" fill="#693c18"/>
    <circle cx="0" cy="0" r="5" fill="#241205"/>
  </g>
  <g transform="translate(250, 480) scale(1) rotate(-15)" filter="url(#shadow)">
    <path d="M 0,-30 L 10,-10 L 30,-10 L 15,5 L 25,25 L 0,15 L -25,25 L -15,5 L -30,-10 L -10,-10 Z" fill="#4d280c"/>
    <circle cx="0" cy="0" r="5" fill="#241205"/>
  </g>

  <!-- Cinnamon Sticks -->
  <g transform="translate(130, 200) rotate(25)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="35" rx="12" ry="12" fill="#a46835"/>
    <line x1="15" y1="12" x2="165" y2="12" stroke="#663612" stroke-width="3"/>
    <line x1="10" y1="23" x2="170" y2="23" stroke="#522a0c" stroke-width="2"/>
  </g>
  <g transform="translate(160, 240) rotate(10)" filter="url(#shadow)">
    <rect x="0" y="0" width="150" height="30" rx="10" ry="10" fill="#bc7a42"/>
    <line x1="10" y1="14" x2="140" y2="14" stroke="#7a461b" stroke-width="2"/>
  </g>

  <!-- Wooden Mortar & Pestle -->
  <!-- Pestle -->
  <g transform="translate(380, 80) rotate(20)" filter="url(#shadow)">
    <path d="M 0 0 C 40 -15, 60 170, 45 200 C 15 210, -50 200, -25 140 Z" fill="url(#woodBowl)"/>
  </g>
  
  <!-- Bowl Back Rim -->
  <ellipse cx="450" cy="300" rx="180" ry="45" fill="#24150a"/>
  
  <!-- Medicine / Herbs Inside Bowl -->
  <ellipse cx="450" cy="320" rx="155" ry="28" fill="#325227"/>
  <ellipse cx="430" cy="315" rx="125" ry="22" fill="#426e33"/>
  <ellipse cx="460" cy="325" rx="100" ry="17" fill="#263b1e"/>
  
  <!-- Bowl Base -->
  <path d="M 270 300 C 270 480, 330 510, 450 510 C 570 510, 630 480, 630 300 Z" fill="url(#woodBowl)" filter="url(#shadow)"/>
  
  <!-- Bowl Front Rim -->
  <path d="M 270 300 C 270 370, 630 370, 630 300 C 620 345, 280 345, 270 300 Z" fill="url(#mortarRim)"/>

  <!-- Scattered Leaves -->
  <g filter="url(#shadow)">
    <path d="M 280 490 C 220 460, 160 510, 190 560 C 240 580, 310 540, 280 490 Z" fill="#426b34"/>
    <line x1="280" y1="490" x2="200" y2="540" stroke="#1d3316" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M 580 450 C 660 420, 700 490, 640 530 C 590 550, 540 500, 580 450 Z" fill="#528740"/>
    <line x1="580" y1="450" x2="650" y2="505" stroke="#26421d" stroke-width="2"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M 640 270 C 710 210, 780 240, 760 320 C 700 360, 610 330, 640 270 Z" fill="#395e2d"/>
    <line x1="640" y1="270" x2="745" y2="305" stroke="#162611" stroke-width="3"/>
  </g>
  <g filter="url(#shadow)">
    <path d="M 450 470 C 410 540, 480 600, 530 570 C 580 520, 510 450, 450 470 Z" fill="#4a7a39"/>
    <line x1="450" y1="470" x2="520" y2="560" stroke="#1e3615" stroke-width="2"/>
  </g>

</svg>
