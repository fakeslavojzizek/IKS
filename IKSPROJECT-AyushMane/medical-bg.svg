<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 600" width="2000" height="600">
  <defs>
    <radialGradient id="bg" cx="40%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="50%" stop-color="#0e2218"/>
      <stop offset="100%" stop-color="#060f0a"/>
    </radialGradient>
    <radialGradient id="cellGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cellGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#15803d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cellBody" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#16a34a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14532d" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="2000" height="600" fill="url(#bg)"/>

  <!-- Grid lines like microscope slide -->
  <g opacity="0.06" stroke="#4ade80" stroke-width="1">
    <line x1="0" y1="100" x2="2000" y2="100"/>
    <line x1="0" y1="200" x2="2000" y2="200"/>
    <line x1="0" y1="300" x2="2000" y2="300"/>
    <line x1="0" y1="400" x2="2000" y2="400"/>
    <line x1="0" y1="500" x2="2000" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1400" y1="0" x2="1400" y2="600"/>
    <line x1="1600" y1="0" x2="1600" y2="600"/>
    <line x1="1800" y1="0" x2="1800" y2="600"/>
  </g>

  <!-- === LARGE BACTERIA (left cluster) === -->
  <g filter="url(#glow)">
    <!-- Bacterium 1 - rod shaped -->
    <ellipse cx="250" cy="200" rx="90" ry="40" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
    <ellipse cx="250" cy="200" rx="90" ry="40" fill="url(#cellBody)"/>
    <!-- Flagella -->
    <path d="M 340 200 Q 400 170 430 200 Q 460 230 510 210 Q 560 190 580 220" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 160 200 Q 100 180 70 210 Q 40 240 10 220" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <!-- Nucleus -->
    <ellipse cx="250" cy="200" rx="25" ry="15" fill="#22c55e" opacity="0.2"/>
    <ellipse cx="250" cy="200" rx="15" ry="9" fill="#4ade80" opacity="0.15"/>
  </g>

  <!-- Bacterium 2 - smaller, angled -->
  <g filter="url(#softGlow)" transform="translate(120, 350) rotate(-30)">
    <ellipse cx="0" cy="0" rx="70" ry="28" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="70" ry="28" fill="url(#cellBody)"/>
    <path d="M 70 0 Q 120 -20 150 5 Q 180 30 220 15" stroke="#16a34a" stroke-width="1.2" fill="none" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#22c55e" opacity="0.15"/>
  </g>

  <!-- Bacterium 3 - cocci (round) -->
  <g filter="url(#glow)">
    <circle cx="550" cy="420" r="50" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.5"/>
    <circle cx="550" cy="420" r="50" fill="url(#cellGlow1)"/>
    <circle cx="550" cy="420" r="20" fill="#22c55e" opacity="0.1"/>
    <circle cx="540" cy="410" r="8" fill="#4ade80" opacity="0.15"/>
  </g>

  <!-- Bacterium 4 - small cocci cluster -->
  <g filter="url(#softGlow)" opacity="0.6">
    <circle cx="800" cy="150" r="35" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="800" cy="150" r="35" fill="url(#cellGlow2)"/>
    <circle cx="860" cy="165" r="30" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="860" cy="165" r="30" fill="url(#cellGlow2)"/>
    <circle cx="838" cy="120" r="25" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="838" cy="120" r="25" fill="url(#cellGlow2)"/>
  </g>

  <!-- === RIGHT SIDE BACTERIA === -->
  <!-- Large rod bacterium -->
  <g filter="url(#glow)" transform="translate(1300, 180) rotate(20)">
    <ellipse cx="0" cy="0" rx="110" ry="45" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="110" ry="45" fill="url(#cellBody)"/>
    <path d="M 110 0 Q 160 -30 200 -10 Q 240 10 280 -5" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M -110 0 Q -160 25 -200 10 Q -240 -5 -270 15" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="30" ry="14" fill="#4ade80" opacity="0.15"/>
  </g>

  <!-- Cocci cluster right -->
  <g filter="url(#softGlow)" opacity="0.5">
    <circle cx="1600" cy="400" r="45" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="1600" cy="400" r="45" fill="url(#cellGlow1)"/>
    <circle cx="1660" cy="380" r="38" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="1660" cy="380" r="38" fill="url(#cellGlow1)"/>
    <circle cx="1625" cy="445" r="32" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="1625" cy="445" r="32" fill="url(#cellGlow1)"/>
  </g>

  <!-- Another rod on far right -->
  <g filter="url(#softGlow)" transform="translate(1850, 300) rotate(-15)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="80" ry="32" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="80" ry="32" fill="url(#cellBody)"/>
    <path d="M 80 0 Q 130 -20 165 5" stroke="#22c55e" stroke-width="1.2" fill="none" opacity="0.5"/>
  </g>

  <!-- === FLOATING DNA/MOLECULE DOTS === -->
  <g fill="#4ade80" opacity="0.35">
    <circle cx="100" cy="80" r="3"/>
    <circle cx="350" cy="480" r="2"/>
    <circle cx="700" cy="300" r="4"/>
    <circle cx="950" cy="500" r="3"/>
    <circle cx="1100" cy="80" r="2"/>
    <circle cx="1250" cy="450" r="3"/>
    <circle cx="1450" cy="150" r="4"/>
    <circle cx="1750" cy="520" r="2"/>
    <circle cx="1900" cy="100" r="3"/>
    <circle cx="480" cy="60" r="2"/>
    <circle cx="620" cy="540" r="3"/>
    <circle cx="1050" cy="350" r="2"/>
  </g>

  <!-- Horizontal ambient glow bar -->
  <rect x="0" y="250" width="2000" height="100" fill="#22c55e" opacity="0.025"/>
</svg>
