<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fff1db"/>
      <stop offset="100%" stop-color="#bd9a77"/>
    </radialGradient>
    <linearGradient id="copper" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9a4d2e"/>
      <stop offset="30%" stop-color="#e68a5c"/>
      <stop offset="50%" stop-color="#ffb894"/>
      <stop offset="70%" stop-color="#d16b3f"/>
      <stop offset="100%" stop-color="#733219"/>
    </linearGradient>
    <linearGradient id="copperDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5c2813"/>
      <stop offset="50%" stop-color="#a65432"/>
      <stop offset="100%" stop-color="#3d1607"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3daee"/>
      <stop offset="100%" stop-color="#54b1d6"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#401f11" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Table -->
  <ellipse cx="400" cy="550" rx="350" ry="80" fill="#6a4933"/>

  <!-- Copper Pot Overlays -->
  <g transform="translate(0, 30)" filter="url(#glow)">
    <!-- Main Body Curve -->
    <path d="M 300 150 C 150 250, 150 450, 250 500 C 350 540, 450 540, 550 500 C 650 450, 650 250, 500 150 Z" fill="url(#copper)"/>
    
    <!-- Neck -->
    <rect x="350" y="100" width="100" height="60" fill="url(#copperDark)"/>
    
    <!-- Rim -->
    <ellipse cx="400" cy="100" rx="70" ry="15" fill="url(#copper)"/>
    
    <!-- Inner Rim -->
    <ellipse cx="400" cy="100" rx="60" ry="10" fill="url(#copperDark)"/>
    
    <!-- Water inside -->
    <ellipse cx="400" cy="102" rx="56" ry="8" fill="url(#water)"/>
    
    <!-- Highlight Reflection -->
    <path d="M 300 200 C 230 280, 250 400, 300 450" stroke="#ffdec7" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Splashes / Floating droplets -->
  <circle cx="250" cy="200" r="8" fill="url(#water)"/>
  <circle cx="280" cy="150" r="12" fill="url(#water)"/>
  <circle cx="550" cy="220" r="6" fill="url(#water)"/>
</svg>
