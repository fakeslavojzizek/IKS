<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fff5e6"/>
      <stop offset="100%" stop-color="#d4b58c"/>
    </radialGradient>
    <filter id="shadow" dx="5" dy="10">
      <feDropShadow dx="5" dy="8" stdDeviation="6" flood-color="#4a3018" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Palm Leaf Base -->
  <g filter="url(#shadow)">
    <path d="M 100 250 C 300 220, 500 220, 700 250 C 720 280, 720 320, 700 350 C 500 380, 300 380, 100 350 C 80 320, 80 280, 100 250 Z" fill="#e8c792"/>
    <!-- Thread Hole -->
    <circle cx="200" cy="300" r="10" fill="#5c3f22"/>
    <!-- Sanskrit/Brahmi-style ancient text strokes -->
    <path d="M 230 280 L 650 280" stroke="#5c3f22" stroke-width="3" stroke-linecap="round"/>
    <path d="M 230 320 L 620 320" stroke="#5c3f22" stroke-width="3" stroke-linecap="round"/>
    <!-- Scribbles -->
    <path d="M 240 280 Q 250 290 260 280 T 280 280 T 300 290" stroke="#5c3f22" fill="none" stroke-width="4"/>
    <path d="M 330 280 Q 340 300 350 280 T 370 280 T 390 290 T 410 280" stroke="#5c3f22" fill="none" stroke-width="4"/>
    <path d="M 450 280 Q 460 290 470 280 T 490 290 T 510 280 T 530 280 T 550 290 T 570 280" stroke="#5c3f22" fill="none" stroke-width="4"/>
    <path d="M 590 280 Q 600 290 610 280 T 630 290" stroke="#5c3f22" fill="none" stroke-width="4"/>
    
    <!-- Next line -->
    <path d="M 240 320 Q 250 330 260 320 T 280 320 T 300 330" stroke="#5c3f22" fill="none" stroke-width="4"/>
    <path d="M 330 320 Q 340 340 350 320 T 370 320 T 390 330 T 410 320" stroke="#5c3f22" fill="none" stroke-width="4"/>
    <path d="M 430 320 Q 460 330 470 320 T 490 330 T 510 320 T 530 320" stroke="#5c3f22" fill="none" stroke-width="4"/>
  </g>
  
  <g filter="url(#shadow)" transform="translate(20, 70) rotate(-5)">
    <path d="M 100 250 C 300 220, 500 220, 700 250 C 720 280, 720 320, 700 350 C 500 380, 300 380, 100 350 C 80 320, 80 280, 100 250 Z" fill="#d9b680"/>
  </g>

  <!-- Magnifying essence glow -->
  <circle cx="450" cy="300" r="150" fill="#9bc758" opacity="0.1"/>
  <!-- Ancient microscopic representation overlay -->
  <path d="M 380 250 Q 400 220 420 250 T 460 250" stroke="#77a336" stroke-width="4" fill="none" opacity="0.6"/>
  <circle cx="480" cy="270" r="10" fill="#77a336" opacity="0.6"/>
</svg>
